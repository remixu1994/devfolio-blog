services:
  postgres:
    image: postgres:16-alpine
    container_name: devfolio-postgres
    environment:
      POSTGRES_DB: devfolio_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  admin:
    image: node:22-alpine
    container_name: devfolio-admin
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_TYPE: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/devfolio_blog
    volumes:
      - .:/app
      - media-data:/app/storage/media
    command: sh -c "npm install && node .nx/nxw.js serve admin"
    ports:
      - '3000:3000'
    depends_on:
      - postgres

  site:
    image: node:22-alpine
    container_name: devfolio-site
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && node .nx/nxw.js serve site --host=0.0.0.0"
    ports:
      - '4200:4200'
    depends_on:
      - admin

volumes:
  postgres-data:
  media-data:
