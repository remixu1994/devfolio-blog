<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(circle at 20% 0%, #40210f 0%, #160c07 56%, #090503 100%);
        color: #fff7e6;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      #root {
        position: relative;
      }
      .clip {
        position: absolute;
      }
      .bg-image {
        inset: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
      }
      .dark-mask {
        inset: 0;
        width: 1920px;
        height: 1080px;
        background: linear-gradient(120deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.35) 55%, rgba(0, 0, 0, 0.76));
      }
      .title-group {
        left: 120px;
        top: 180px;
        width: 900px;
      }
      .eyebrow {
        font-size: 34px;
        letter-spacing: 6px;
        color: #ffd48a;
        margin-bottom: 18px;
      }
      .main-title {
        font-size: 130px;
        line-height: 1.02;
        font-weight: 900;
        text-shadow: 0 14px 28px rgba(0, 0, 0, 0.45);
      }
      .subtitle {
        margin-top: 26px;
        font-size: 40px;
        color: #ffe8bc;
      }
      .step-card {
        left: 120px;
        top: 680px;
        width: 870px;
        border-radius: 26px;
        background: rgba(55, 24, 10, 0.74);
        border: 1px solid rgba(255, 213, 145, 0.35);
        padding: 34px 40px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.4);
      }
      .step-index {
        font-size: 30px;
        color: #ffd48a;
        margin-bottom: 10px;
      }
      .step-text {
        font-size: 54px;
        line-height: 1.23;
        font-weight: 800;
      }
      .final-badge {
        left: 120px;
        top: 130px;
        width: 800px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(225, 88, 26, 0.9), rgba(255, 170, 44, 0.9));
        padding: 24px 40px;
        font-size: 48px;
        font-weight: 900;
        letter-spacing: 2px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      }
      .footer-line {
        left: 120px;
        top: 930px;
        font-size: 34px;
        color: #ffe6b5;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="18"
      data-width="1920"
      data-height="1080"
    >
      <img id="bg1" class="clip bg-image" data-start="0" data-duration="6" data-track-index="1" src="./assets/hero_hairtail.png" alt="红烧带鱼成品" />
      <div id="mask1" class="clip dark-mask" data-start="0" data-duration="6" data-track-index="2"></div>
      <div id="titleGroup" class="clip title-group" data-start="0.2" data-duration="5.6" data-track-index="3">
        <div class="eyebrow">家常硬菜 · 香浓下饭</div>
        <div class="main-title">红烧带鱼</div>
        <div class="subtitle">外酥里嫩，咸甜鲜香</div>
      </div>

      <img id="bg2" class="clip bg-image" data-start="6" data-duration="8" data-track-index="1" src="./assets/hairtail-steps.png" alt="红烧带鱼步骤" />
      <div id="mask2" class="clip dark-mask" data-start="6" data-duration="8" data-track-index="2"></div>
      <div id="step1" class="clip step-card" data-start="6.2" data-duration="2.5" data-track-index="3">
        <div class="step-index">STEP 1</div>
        <div class="step-text">带鱼切段拍粉，热锅煎至两面微金黄</div>
      </div>
      <div id="step2" class="clip step-card" data-start="8.8" data-duration="2.4" data-track-index="3">
        <div class="step-index">STEP 2</div>
        <div class="step-text">爆香姜蒜，烹入生抽、老抽、料酒和糖</div>
      </div>
      <div id="step3" class="clip step-card" data-start="11.25" data-duration="2.55" data-track-index="3">
        <div class="step-index">STEP 3</div>
        <div class="step-text">回锅焖煮收汁，汤汁浓亮后出锅</div>
      </div>

      <img id="bg3" class="clip bg-image" data-start="14" data-duration="4" data-track-index="1" src="./assets/hero_hairtail.png" alt="红烧带鱼特写" />
      <div id="mask3" class="clip dark-mask" data-start="14" data-duration="4" data-track-index="2"></div>
      <div id="finalBadge" class="clip final-badge" data-start="14.2" data-duration="3.4" data-track-index="3">色泽红亮 · 酱香拉满</div>
      <div id="footerLine" class="clip footer-line" data-start="14.4" data-duration="3.2" data-track-index="4">配一碗热米饭，马上开吃。</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#titleGroup", { opacity: 0, x: -50, duration: 1 }, 0.15);
      tl.from(".main-title", { scale: 0.92, duration: 1.1, ease: "power2.out" }, 0.2);
      tl.from(".subtitle", { opacity: 0, y: 24, duration: 0.8 }, 0.65);
      tl.to("#bg1", { scale: 1.07, duration: 6, ease: "none" }, 0);

      tl.from("#step1", { opacity: 0, y: 45, duration: 0.45 }, 6.2);
      tl.to("#step1", { opacity: 0, y: -20, duration: 0.35 }, 8.35);
      tl.from("#step2", { opacity: 0, y: 45, duration: 0.45 }, 8.8);
      tl.to("#step2", { opacity: 0, y: -20, duration: 0.35 }, 10.9);
      tl.set("#step2", { opacity: 0 }, 11.25);
      tl.from("#step3", { opacity: 0, y: 45, duration: 0.45 }, 11.2);
      tl.to("#step3", { opacity: 0, y: -20, duration: 0.4 }, 13.5);
      tl.to("#bg2", { scale: 1.08, x: -40, y: -16, duration: 8, ease: "none" }, 6);

      tl.from("#finalBadge", { opacity: 0, y: 36, duration: 0.55 }, 14.2);
      tl.from("#footerLine", { opacity: 0, y: 28, duration: 0.55 }, 14.4);
      tl.to("#bg3", { scale: 1.1, duration: 4, ease: "none" }, 14);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
